name: Deploy Vite site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Nyomozás (Mappák listázása)
        run: |
          echo "--- MI VAN A FŐKÖNYVTÁRBAN? ---"
          ls -F
          echo "--- MI VAN A DIST MAPPÁBAN? ---"
          ls -R dist || echo "Nincs dist mappa"
          echo "--- MI VAN A .OUTPUT MAPPÁBAN? ---"
          ls -R .output || echo "Nincs .output mappa"
          echo "--- MI VAN A BUILD MAPPÁBAN? ---"
          ls -R build || echo "Nincs build mappa"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Ha a nyomozás során kiderül, hogy nem a dist-be épít, 
          # ezt az egy sort kell majd módosítanod:
          path: './.output/public'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
