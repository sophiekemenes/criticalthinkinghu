name: Deploy Vite site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build (GitHub Pages SPA)
        run: npm run build:ghpages

      - name: Prepare static output
        run: |
          # GitHub Pages a gyökérben index.html-t vár
          mv dist-ghpages/index.spa.html dist-ghpages/index.html
          # SPA fallback: minden ismeretlen route is az index.html-t kapja
          cp dist-ghpages/index.html dist-ghpages/404.html
          # GitHub Pages ne futtasson Jekyll-t (különben az _-kezdetű asseteket szűri)
          touch dist-ghpages/.nojekyll
          # Custom domain átmásolása
          if [ -f CNAME ]; then cp CNAME dist-ghpages/CNAME; fi
          echo "--- Output mappa tartalma: ---"
          ls -la dist-ghpages/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist-ghpages'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
